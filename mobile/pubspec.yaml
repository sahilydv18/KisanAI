name: kisanai

description: AI-powered agriculture platform for Indian farmers.

publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  http: ^1.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  fl_chart: ^0.68.0
  speech_to_text: ^6.6.2

flutter:
  uses-material-design: true
  assets:
    - assets/mock/mandi_prices.json
    - assets/mock/yield_samples.json
