name: Mobile Debug Builds

on:
  workflow_dispatch:
  push:
    paths:
      - "mobile/**"
      - ".github/workflows/mobile-release.yml"

jobs:
  android-debug:
    name: Android Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: "stable"
      - name: Flutter pub get
        run: flutter pub get
      - name: Ensure platform folders
        run: |
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            flutter create .
          fi
      - name: Build debug APK
        run: flutter build apk --debug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kisanai-debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk

  ios-debug:
    name: iOS Debug Build (No Codesign)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.2"
          channel: "stable"
      - name: Flutter pub get
        run: flutter pub get
      - name: Ensure platform folders
        run: |
          if [ ! -d "android" ] || [ ! -d "ios" ]; then
            flutter create .
          fi
      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign
      - name: Package .app for simulator testing
        run: |
          mkdir -p ../artifacts
          cp -R build/ios/iphoneos/Runner.app ../artifacts/Runner.app
      - name: Upload iOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: kisanai-ios-debug-app
          path: mobile/artifacts/Runner.app
